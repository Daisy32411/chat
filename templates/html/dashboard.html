<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат - Личный кабинет</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="/static/js/dashboard.js" defer></script>
</head>
<body data-username="{{.}}">
<div class="sidebar" id="sidebar">
    <div class="search-box">
        <div class="menu-toggle" id="menuToggle">☰</div>
        <input type="text" id="searchInput" placeholder="Search">
        <div id="searchResults" class="search-results" style="display:none;"></div>
    </div>
    <div class="dialogs-list" id="dialogsList"></div>
    <!-- удаляем logout-btn отсюда -->
</div>
<div class="resizer" id="resizer"></div>
<div class="chat-area">
    <div class="chat-header" id="chatHeader"></div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="input-area" id="inputArea" style="display: none;">
        <input type="text" id="messageInput" placeholder="Write a message...">
        <button id="sendBtn">Отправить</button>
    </div>
</div>

<!-- Правая панель профиля -->
<div id="profilePanel" class="profile-panel">
    <div class="profile-header">
        <span>Профиль</span>
        <button id="closeProfileBtn" class="close-btn">&times;</button>
    </div>
    <div class="profile-content">
        <div class="profile-username">
            <strong>Username:</strong> <span id="profileUsername">{{.}}</span>
        </div>
        <button id="logoutFromProfile" class="profile-logout-btn">Выйти</button>
    </div>
</div>
<div id="overlay" class="overlay"></div>
</body>
</html>
