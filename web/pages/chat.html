<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="chat-page">
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div>
          <h2>Chats</h2>
          <p id="me" class="muted"></p>
        </div>
        <button id="logout-btn" class="ghost">Logout</button>
      </div>

      <input id="user-search" class="search" type="text" placeholder="Search users...">
      <div id="search-results" class="list"></div>

      <h3>Dialogs</h3>
      <div id="dialogs" class="list"></div>
    </aside>

    <main class="chat">
      <div class="chat-header">
        <div>
          <h2 id="chat-title">Select a dialog</h2>
          <p id="chat-subtitle" class="muted">Search a user or choose an existing dialog.</p>
        </div>
      </div>

      <div id="messages" class="messages"></div>

      <form id="send-form" class="send-form">
        <input id="message-input" type="text" placeholder="Write a message..." autocomplete="off">
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
